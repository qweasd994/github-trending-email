name: Build & Deploy Tech Trending Site

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-site.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/generate-site.ts'
      - 'src/**'
  schedule:
    # Run daily at UTC 1:00 (9:00 AM UTC+8 / 9:00 PM UTC+8)
    - cron: '0 1 * * *'
    # Backup run at UTC 13:00 (9:00 PM UTC+8)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - debug
          - warning
          - info

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Generate trending site
        run: pnpm run generate:site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
